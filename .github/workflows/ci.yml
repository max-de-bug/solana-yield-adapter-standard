name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  SOLANA_CLI_VERSION: 2.2.20
  ANCHOR_CLI_VERSION: 1.0.1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
          toolchain: stable
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace -- -D warnings
        continue-on-error: true

  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_CLI_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
      - uses: Swatinem/rust-cache@v2
      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/solana-foundation/anchor --tag "v${{ env.ANCHOR_CLI_VERSION }}" anchor-cli --locked
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build programs
        run: anchor build
      - name: Run unit tests
        run: cargo test
      - name: Validate
        run: bash scripts/validate.sh
