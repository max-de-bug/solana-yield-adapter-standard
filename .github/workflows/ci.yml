name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  SOLANA_CLI_VERSION: 2.2.20
  ANCHOR_CLI_VERSION: 1.0.1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
          toolchain: stable
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace -- -D warnings
        continue-on-error: true

  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_CLI_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
      - uses: Swatinem/rust-cache@v2
      - name: Cache Anchor CLI binary
        id: cache-anchor
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/anchor
          key: anchor-cli-${{ env.ANCHOR_CLI_VERSION }}
      - name: Install Anchor CLI
        if: steps.cache-anchor.outputs.cache-hit != 'true'
        run: |
          curl -sSfL "https://github.com/solana-foundation/anchor/releases/download/v${{ env.ANCHOR_CLI_VERSION }}/anchor-${{ env.ANCHOR_CLI_VERSION }}-x86_64-unknown-linux-gnu" -o anchor \
            && chmod +x anchor \
            && sudo mv anchor /usr/local/bin/anchor \
            && anchor --version \
          || {
            echo "Pre-built binary failed (GLIBC mismatch). Falling back to cargo install..."
            cargo install --git https://github.com/solana-foundation/anchor --tag "v${{ env.ANCHOR_CLI_VERSION }}" anchor-cli --locked
            sudo cp "$HOME/.cargo/bin/anchor" /usr/local/bin/anchor
          }
      - name: Verify Anchor
        run: anchor --version
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - name: Sync keys (handle stale cache)
        run: anchor keys sync
      - name: Build programs
        run: anchor build
      - name: Run unit tests
        run: cargo test
      - name: Validate
        run: bash scripts/validate.sh
